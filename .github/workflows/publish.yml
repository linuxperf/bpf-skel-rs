name: Publish crate

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    environment: crates-io

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install BCC build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            arping \
            bison \
            build-essential \
            cmake \
            flex \
            git \
            iperf \
            libclang-18-dev \
            libdebuginfod-dev \
            libedit-dev \
            libelf-dev \
            libfl-dev \
            libllvm18 \
            liblzma-dev \
            libpolly-18-dev \
            llvm-18-dev \
            netperf \
            python3 \
            python3-setuptools \
            zlib1g-dev \
            zip \
            llvm \
            clang

      - name: Verify tag matches crate version
        if: github.event_name == 'push'
        working-directory: crates/bpf-skel
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n1)"
          tag="${GITHUB_REF_NAME#v}"
          test "$tag" = "$version"

      - name: Generate skeletons
        run: cargo xtask gen-skel

      - name: Verify generated skeletons exist
        run: |
          test -f crates/bpf-skel/src/skel/mod.rs

      - name: Package
        run: cargo xtask package

      - name: Publish
        working-directory: crates/bpf-skel
        run: cargo publish --allow-dirty --locked --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
